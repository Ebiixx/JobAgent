<!DOCTYPE html>

<body class="bg-light">

    <div class="container py-5">

            <!-- Job & Arbeitgeber -->

            <!-- Tab 3: KI Agent starten -->

                <button class="btn btn-success" onclick="startAgent()">🚀 Bewerbung erstellen lassen</button>

            </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>


  <!-- Custom Script -->
  <script>

    let experienceData = [];
    let educationData = [];
    let internshipData = [];


    async function startAgent() {
    const data = {
        name: document.getElementById('name').value,
        birthdate: document.getElementById('birthdate').value,
        address: document.getElementById('address').value,
        jobTitle: document.getElementById('jobTitle').value,
        company: document.getElementById('company').value,
        companyUrl: document.getElementById('companyUrl').value,  // Unternehmens-URL
        jobDescription: document.getElementById('jobDescription').value,
    };

    if (!data.companyUrl || !data.name || !data.birthdate || !data.address || !data.jobTitle || !data.company || !data.jobDescription) {
        alert('Bitte fülle alle Felder aus.');
        return;
    }

    // Anfrage an den Server senden
    try {
// In deinem Frontend-Code
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), 60000); // 60 Sek

const response = await fetch('/api/generate-cover-letter', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(data),
  signal: controller.signal
});
clearTimeout(timeoutId);


        const result = await response.json();
        if (response.ok) {
            document.getElementById('responseOutput').innerHTML = formatLetter(result.coverLetter);
        } else {
            document.getElementById('responseOutput').textContent = result.error || 'Fehler bei der Generierung des Bewerbungsschreibens.';
        }

    } catch (error) {
        document.getElementById('responseOutput').textContent = 'Fehler beim Senden der Anfrage.';
        console.error(error);
    }
}







// Upload Funktion    
async function uploadCV(event) {
  event.preventDefault(); // Verhindert Neuladen der Seite

  const fileInput = document.getElementById('cvUpload');
  const status = document.getElementById('uploadStatus');

  if (!fileInput.files[0]) {
    alert('Bitte eine PDF-Datei auswählen!');
    return;
  }

  const formData = new FormData();
  formData.append('cv', fileInput.files[0]);

  status.style.display = 'inline';
  status.textContent = '📤 Datei wird hochgeladen...';

  try {
    const res = await fetch('/api/upload-cv', {
      method: 'POST',
      body: formData,
    });

    const data = await res.json();
    console.log("📦 Daten vom Server erhalten:", data);

    if (!data.extracted) {
      console.error("⚠️ Keine 'extracted'-Antwort vom Server erhalten!");
      status.textContent = '⚠️ KI konnte keine Daten extrahieren.';
      return;
    }

    status.textContent = '✅ KI-Daten erhalten. Verarbeite Antwort...';
    await delay(500); // kleine Pause, damit Status sichtbar bleibt

    const json = data.extracted;
    console.log("✅ Verarbeitetes JSON:", json);

    if (json) {
      console.log("➡️ Versuche, Felder zu befüllen...");

      // Name
      if (json.name) {
        console.log("✏️ Name gefunden:", json.name);
        document.getElementById('name').value = json.name;
      }

      // Geburtsdatum (Konvertierung DD.MM.YYYY ➔ YYYY-MM-DD)
      if (json.birthdate) {
        console.log("✏️ Geburtsdatum gefunden:", json.birthdate);
        const parts = json.birthdate.split('.');
        if (parts.length === 3) {
          const formattedDate = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
          document.getElementById('birthdate').value = formattedDate;
        } else {
          console.warn("⚠️ Geburtsdatum konnte nicht umformatiert werden:", json.birthdate);
        }
      }

      // Adresse
      if (json.address) {
        console.log("✏️ Adresse gefunden:", json.address);
        document.getElementById('address').value = json.address;
      }

      // Berufserfahrungen
      if (json.experience && Array.isArray(json.experience)) {
        console.log("✏️ Strukturierte Berufserfahrungen gefunden:", json.experience);

        const newExperiences = json.experience.map(exp => {
            if (typeof exp === 'string') {
                return { tätigkeit: exp, zeitraum: '', einrichtung: '' };
            }
            return {
                tätigkeit: exp.tätigkeit || '',
                zeitraum: exp.zeitraum || '',
                einrichtung: exp.einrichtung || ''
            };
            });

            // Alte Daten beibehalten, neue hinzufügen
            experienceData = [...experienceData, ...newExperiences];

            renderExperienceList();
        }

        // Schule
        if (json.education && Array.isArray(json.education)) {
            console.log("✏️ Schulbildung/Ausbildung gefunden:", json.education);

            const newEducation = json.education.map(edu => ({
                abschluss: edu.abschluss || '',
                schulname: edu.schulname || '',
                zeitraum: edu.zeitraum || ''
            }));

            // Alte Daten beibehalten, neue hinzufügen
            educationData = [...educationData, ...newEducation];

            renderEducationList();
        }

        // Praktika
        if (json.internships && Array.isArray(json.internships)) {
            console.log("✏️ Praktika gefunden:", json.internships);

            const newInternships = json.internships.map(intern => ({
                praktikum: intern.praktikum || '',
                zeitraum: intern.zeitraum || '',
                unternehmen: intern.unternehmen || ''
            }));

            // Alte Daten beibehalten, neue hinzufügen
            internshipData = [...internshipData, ...newInternships];

            renderInternshipList();
        }

    


      status.textContent = '✅ Felder erfolgreich aus KI-Daten befüllt!';
    } else {
      console.error("⚠️ JSON war leer oder ungültig.");
      status.textContent = '⚠️ KI-Antwort konnte nicht verarbeitet werden.';
    }

  } catch (err) {
    console.error("❌ Schwerer Fehler bei Upload/Verarbeitung:", err);
    status.textContent = '❌ Schwerer Fehler beim Upload oder bei der Analyse.';
  }
}


// Hilfsfunktion für kleine Wartezeiten
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}


// Rendern der Berufsausbildung
function renderExperienceList() {
  const experienceList = document.getElementById('experienceList');
  experienceList.innerHTML = '';

  experienceData.forEach((exp, index) => {
    const item = document.createElement('div');
    item.className = 'list-group-item mb-3 shadow-sm rounded';

    item.innerHTML = `
      <div class="row g-3 align-items-center">
        <div class="col-md-1 d-flex align-items-center justify-content-center">
          <span class="drag-handle" style="cursor: grab;">☰</span>
        </div>
        <div class="col-md-4">
          <label class="form-label">Praktikum</label>
          <input type="text" class="form-control" value="${exp.tätigkeit || ''}" 
            onchange="updateExperienceField(${index}, 'tätigkeit', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Unternehmen</label>
           <input type="text" class="form-control" value="${exp.einrichtung || ''}" 
            onchange="updateExperienceField(${index}, 'einrichtung', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Zeitraum</label>
          <input type="text" class="form-control" value="${exp.zeitraum || ''}" 
            onchange="updateExperienceField(${index}, 'zeitraum', this.value)">
        </div>
      </div>
      <div class="text-end mt-2">
        <button class="btn btn-sm btn-danger" onclick="deleteExperience(${index})">
          🗑️ Löschen
        </button>
      </div>
    `;
    experienceList.appendChild(item);
  });
}

// Rendern der Schulbildung/Ausbildung
function renderEducationList() {
  const educationList = document.getElementById('educationList');
  educationList.innerHTML = '';

  educationData.forEach((edu, index) => {
    const item = document.createElement('div');
    item.className = 'list-group-item mb-3 shadow-sm rounded';

    item.innerHTML = `
      <div class="row g-3 align-items-center">
        <div class="col-md-1 d-flex align-items-center justify-content-center">
          <span class="drag-handle" style="cursor: grab;">☰</span>
        </div>
        <div class="col-md-4">
          <label class="form-label">Abschluss</label>
          <input type="text" class="form-control" value="${edu.abschluss || ''}" 
            onchange="updateEducationField(${index}, 'abschluss', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Schulname</label>
          <input type="text" class="form-control" value="${edu.schulname || ''}" 
            onchange="updateEducationField(${index}, 'schulname', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Zeitraum</label>
          <input type="text" class="form-control" value="${edu.zeitraum || ''}" 
            onchange="updateEducationField(${index}, 'zeitraum', this.value)">
        </div>
      </div>
      <div class="text-end mt-2">
        <button class="btn btn-sm btn-danger" onclick="deleteEducation(${index})">
          🗑️ Löschen
        </button>
      </div>
    `;
    educationList.appendChild(item);
  });
}

// Rendern der Praktika
function renderInternshipList() {
  const internshipList = document.getElementById('internshipList');
  internshipList.innerHTML = '';

  internshipData.forEach((intern, index) => {
    const item = document.createElement('div');
    item.className = 'list-group-item mb-3 shadow-sm rounded';

    item.innerHTML = `
      <div class="row g-3 align-items-center">
        <div class="col-md-1 d-flex align-items-center justify-content-center">
          <span class="drag-handle" style="cursor: grab;">☰</span>
        </div>
        <div class="col-md-4">
          <label class="form-label">Praktikum</label>
          <input type="text" class="form-control" value="${intern.praktikum || ''}" 
            onchange="updateInternshipField(${index}, 'praktikum', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Unternehmen</label>
          <input type="text" class="form-control" value="${intern.unternehmen || ''}" 
            onchange="updateInternshipField(${index}, 'unternehmen', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Zeitraum</label>
          <input type="text" class="form-control" value="${intern.zeitraum || ''}" 
            onchange="updateInternshipField(${index}, 'zeitraum', this.value)">
        </div>
      </div>
      <div class="text-end mt-2">
        <button class="btn btn-sm btn-danger" onclick="deleteInternship(${index})">
          🗑️ Löschen
        </button>
      </div>
    `;
    internshipList.appendChild(item);
  });
}



// Update-Funktion für Berufsausbildungen
function updateExperienceField(index, field, value) {
  experienceData[index][field] = value;
  console.log(`📝 Erfahrung ${index} - Feld ${field} aktualisiert auf:`, value);
}

// Update-Funktion für Education
function updateEducationField(index, field, value) {
  educationData[index][field] = value;
  console.log(`📝 Schulbildung ${index} - Feld ${field} aktualisiert auf:`, value);
}

// Update-Funktion für Internship
function updateInternshipField(index, field, value) {
  internshipData[index][field] = value;
  console.log(`📝 Praktikum ${index} - Feld ${field} aktualisiert auf:`, value);
}


// Löschen der Berufsausbildungen
function deleteExperience(index) {
    if (confirm("Willst du diese Erfahrung wirklich löschen?")) {
        // Konsolenausgabe zum Prüfen des aktuellen Zustands
        console.log("Vor dem Löschen:", experienceData);
        
        // Das Element löschen
        experienceData.splice(index, 1);

        // Konsolenausgabe nach dem Löschen
        console.log("Nach dem Löschen:", experienceData);
        
        // Liste neu rendern
        renderExperienceList();
    }
}


// Löschen der Schulbildung/Ausbildung
function deleteEducation(index) {
  if (confirm("Willst du diese Schulbildung/Ausbildung wirklich löschen?")) {
    educationData.splice(index, 1);
    renderEducationList();
  }
}

// Löschen des Praktikums
function deleteInternship(index) {
  if (confirm("Willst du dieses Praktikum wirklich löschen?")) {
    internshipData.splice(index, 1);
    renderInternshipList();
  }
}


function editExperience(index) {
  const exp = experienceData[index];
  const tätigkeit = prompt("Tätigkeit bearbeiten:", exp.tätigkeit || '');
  const zeitraum = prompt("Zeitraum bearbeiten:", exp.zeitraum || '');
  const einrichtung = prompt("Einrichtung bearbeiten:", exp.einrichtung || '');

  if (tätigkeit !== null && zeitraum !== null && einrichtung !== null) {
    experienceData[index] = { tätigkeit, zeitraum, einrichtung };
    renderExperienceList();
  }
}

// Manuelles Hinzufügen von Berufserfahrungen
function addExperience() {
  experienceData.push({ tätigkeit: '', zeitraum: '', einrichtung: '' });
  renderExperienceList();
}

// Manuelles Hinzufügen von Schulbildung/Ausbildung
function addEducation() {
  educationData.push({ abschluss: '', schulname: '', zeitraum: '' });
  renderEducationList();
}

// Manuelles Hinzufügen von Praktika
function addInternship() {
  internshipData.push({ praktikum: '', zeitraum: '', unternehmen: '' });
  renderInternshipList();
}



// Nach dem DOM-Render einmal Sortable aktivieren
new Sortable(document.getElementById('experienceList'), {
  animation: 150,
  handle: '.drag-handle',
  ghostClass: 'bg-light',
  onEnd: function (evt) {
    // Neue Reihenfolge übernehmen
    const oldIndex = evt.oldIndex;
    const newIndex = evt.newIndex;

    if (oldIndex !== newIndex) {
      const movedItem = experienceData.splice(oldIndex, 1)[0];
      experienceData.splice(newIndex, 0, movedItem);
      console.log("🔀 Neue Reihenfolge:", experienceData);
    }
  }
});

new Sortable(document.getElementById('educationList'), {
  animation: 150,
  handle: '.drag-handle',
  ghostClass: 'bg-light',
  onEnd: function (evt) {
    // Neue Reihenfolge übernehmen
    const oldIndex = evt.oldIndex;
    const newIndex = evt.newIndex;

    if (oldIndex !== newIndex) {
      const movedItem = educationData.splice(oldIndex, 1)[0];
      educationData.splice(newIndex, 0, movedItem);
      console.log("🔀 Neue Reihenfolge:", educationData);
    }
  }
});

new Sortable(document.getElementById('internshipList'), {
  animation: 150,
  handle: '.drag-handle',
  ghostClass: 'bg-light',
  onEnd: function (evt) {
    // Neue Reihenfolge übernehmen
    const oldIndex = evt.oldIndex;
    const newIndex = evt.newIndex;

    if (oldIndex !== newIndex) {
      const movedItem = internshipData.splice(oldIndex, 1)[0];
      internshipData.splice(newIndex, 0, movedItem);
      console.log("🔀 Neue Reihenfolge:", internshipData);
    }
  }
});


function formatLetter(text) {
  // Absätze erkennen (2 oder mehr Zeilenumbrüche)
  const paragraphs = text.trim().split(/\n\s*\n/);
  return paragraphs
    .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
    .join('');
}

function copyLetter() {
  const html = document.getElementById('responseOutput').innerText;
  navigator.clipboard.writeText(html).then(() => {
    alert('Anschreiben kopiert!');
  });
}
