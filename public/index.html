<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobAgent</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.quilljs.com/2.0.0-dev.4/quill.snow.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4 text-center">📄 JobAgent – Bewerbungshelfer</h1>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-3" id="formTabs" role="tablist">
        <li class="nav-item">
          <button
            class="nav-link active"
            id="personal-tab"
            data-bs-toggle="tab"
            data-bs-target="#personal"
            type="button"
            role="tab"
          >
            1. Persönliche Daten
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link"
            id="job-tab"
            data-bs-toggle="tab"
            data-bs-target="#job"
            type="button"
            role="tab"
          >
            2. Job & Arbeitgeber
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link"
            id="result-tab"
            data-bs-toggle="tab"
            data-bs-target="#result"
            type="button"
            role="tab"
          >
            3. KI Agent starten
          </button>
        </li>
      </ul>

      <!-- Tab Inhalte -->
      <div class="tab-content" id="formTabsContent">
        <!-- Persönliche Daten -->
        <div class="tab-pane fade show active" id="personal" role="tabpanel">
          <form id="formPersonal">
            <!-- Standardfelder -->
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="Max Mustermann"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Geburtsdatum</label>
              <input type="date" class="form-control" id="birthdate" />
            </div>

            <div class="mb-3">
              <label class="form-label">Adresse</label>
              <input type="text" class="form-control" id="address" />
            </div>

            <!-- NEU: Telefon -->
            <div class="mb-3">
              <label class="form-label">Telefonnummer</label>
              <input
                type="text"
                class="form-control"
                id="phone"
                placeholder="+49 170 1234567"
              />
            </div>

            <!-- NEU: E-Mail -->
            <div class="mb-3">
              <label class="form-label">E-Mail-Adresse</label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="max@example.com"
              />
            </div>

            <!-- NEU: LinkedIn -->
            <div class="mb-3">
              <label class="form-label">LinkedIn Profil (optional)</label>
              <input
                type="url"
                class="form-control"
                id="linkedin"
                placeholder="https://linkedin.com/in/username"
              />
            </div>

            <!-- Berufserfahrung -->
            <div class="mb-3">
              <div id="experienceContainer" class="list-group mb-3">
                <div class="d-flex justify-content-between align-items-center">
                  <label class="form-label">Berufserfahrung</label>
                  <button
                    type="button"
                    class="btn btn-primary"
                    onclick="addExperience()"
                  >
                    ➕ Neue Erfahrung
                  </button>
                </div>
                <div id="experienceList" class="list-group mb-3"></div>
              </div>
            </div>

            <!-- Schulbildung -->
            <div class="mb-3">
              <div id="educationContainer" class="list-group mb-3">
                <div class="d-flex justify-content-between align-items-center">
                  <label class="form-label">Schulbildung / Ausbildung</label>
                  <button
                    type="button"
                    class="btn btn-primary"
                    onclick="addEducation()"
                  >
                    ➕ Neue Ausbildung
                  </button>
                </div>
                <div id="educationList" class="list-group mb-3"></div>
              </div>
            </div>

            <!-- Praktika -->
            <div class="mb-3">
              <div id="internshipContainer" class="list-group mb-3">
                <div class="d-flex justify-content-between align-items-center">
                  <label class="form-label">Praktika</label>
                  <button
                    type="button"
                    class="btn btn-primary"
                    onclick="addInternship()"
                  >
                    ➕ Neues Praktikum
                  </button>
                </div>
                <div id="internshipList" class="list-group mb-3"></div>
              </div>
            </div>

            <!-- Lebenslauf-Upload -->
            <div class="mb-3">
              <label class="form-label">Lebenslauf (PDF)</label>
              <input
                type="file"
                class="form-control"
                id="cvUpload"
                accept=".pdf"
              />
              <button
                type="button"
                class="btn btn-secondary mt-2"
                onclick="uploadCV(event)"
              >
                📤 PDF auslesen
              </button>
              <div
                id="uploadStatus"
                class="form-text text-muted mt-1"
                style="display: none"
              >
                ⏳ Wird analysiert...
              </div>
            </div>
          </form>
        </div>

        <!-- Job & Arbeitgeber -->
        <div class="tab-pane fade" id="job" role="tabpanel">
          <form id="formJob">
            <div class="mb-3">
              <label class="form-label">Stellenbezeichnung</label>
              <input
                type="text"
                class="form-control"
                id="jobTitle"
                placeholder="z.B. Softwareentwickler (m/w/d)"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Unternehmen</label>
              <input
                type="text"
                class="form-control"
                id="company"
                placeholder="z.B. Cloudflight GmbH"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Unternehmens-Website</label>
              <input
                type="url"
                class="form-control"
                id="companyUrl"
                placeholder="https://..."
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Stellenbeschreibung</label>
              <textarea
                class="form-control"
                id="jobDescription"
                rows="3"
              ></textarea>
            </div>
          </form>
        </div>

        <!-- Ergebnis -->

        <div class="tab-pane fade" id="result" role="tabpanel">
          <p>Wenn alles ausgefüllt ist, kannst du starten:</p>

          <button class="btn btn-success" onclick="startAgent()">
            🚀 Bewerbung erstellen lassen
          </button>

          <div id="loadingStatus" class="align-items-center my-3" hidden>
            <div class="spinner-border text-primary me-3" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>

            <span id="loadingText"
              >⏳ Der KI-Agent generiert dein Bewerbungsschreiben…</span
            >
          </div>

          <div
            id="letterContainer"
            class="bg-white p-5 rounded shadow-sm mx-auto"
            style="max-width: 800px"
          >
            <h2 class="mb-4 text-center text-primary">
              📄 Ihr Bewerbungsschreiben
            </h2>

            <div id="quillWrapper" style="display: none">
              <div id="toolbar">
                <span class="ql-formats">
                  <select class="ql-header">
                    <option selected></option>

                    <option value="1"></option>

                    <option value="2"></option>
                  </select>
                  <button class="ql-bold"></button>
                  <button class="ql-italic"></button>
                  <button class="ql-underline"></button>
                </span>

                <span class="ql-formats">
                  <button class="ql-link"></button>
                  <button class="ql-list" value="ordered"></button>
                  <button class="ql-list" value="bullet"></button>
                  <button class="ql-clean"></button>
                </span>
              </div>

              <div id="responseEditor" style="min-height: 400px"></div>
            </div>

            <div id="responseOutput" class="mt-3" style="display: none"></div>
          </div>

          <!-- Button-Zeile: links & rechts ausgerichtet -->

          <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-outline-secondary" onclick="copyLetter()">
              📋 In Zwischenablage
            </button>

            <div>
              <button
                id="editButton"
                class="btn btn-outline-primary me-2"
                onclick="enterEditMode()"
              >
                ✏️ Bearbeiten
              </button>

              <button
                id="saveButton"
                class="btn btn-success"
                onclick="exitEditMode()"
                hidden
              >
                💾 Speichern
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <!-- Quill -->
    <script src="https://cdn.quilljs.com/2.0.0-dev.4/quill.min.js"></script>

    <!-- Custom Script -->
    <script>
      // === Lokale Zwischenspeicherung (Autosave) für JobAgent ===
      const STORAGE_KEY = "jobAgentState";

      function saveState() {
        const state = {
          name: document.getElementById("name").value,
          birthdate: document.getElementById("birthdate").value,
          address: document.getElementById("address").value,
          phone: document.getElementById("phone").value,
          email: document.getElementById("email").value,
          linkedin: document.getElementById("linkedin").value,
          jobTitle: document.getElementById("jobTitle").value,
          company: document.getElementById("company").value,
          companyUrl: document.getElementById("companyUrl").value,
          jobDescription: document.getElementById("jobDescription").value,
          experienceData,
          educationData,
          internshipData,
          lastGeneratedLetterHTML,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const state = JSON.parse(saved);

        if (state.name) document.getElementById("name").value = state.name;
        if (state.birthdate)
          document.getElementById("birthdate").value = state.birthdate;
        if (state.address)
          document.getElementById("address").value = state.address;
        if (state.phone) document.getElementById("phone").value = state.phone;
        if (state.email) document.getElementById("email").value = state.email;
        if (state.linkedin)
          document.getElementById("linkedin").value = state.linkedin;
        if (state.jobTitle)
          document.getElementById("jobTitle").value = state.jobTitle;
        if (state.company)
          document.getElementById("company").value = state.company;
        if (state.companyUrl)
          document.getElementById("companyUrl").value = state.companyUrl;
        if (state.jobDescription)
          document.getElementById("jobDescription").value =
            state.jobDescription;

        experienceData = state.experienceData || [];
        educationData = state.educationData || [];
        internshipData = state.internshipData || [];
        lastGeneratedLetterHTML = state.lastGeneratedLetterHTML || "";

        renderExperienceList();
        renderEducationList();
        renderInternshipList();

        if (lastGeneratedLetterHTML) {
          document.getElementById("responseOutput").innerHTML =
            lastGeneratedLetterHTML;
          document.getElementById("responseOutput").style.display = "block";
          document.getElementById("editButton").hidden = false;
        }
        const resultTab = new bootstrap.Tab(
          document.querySelector("#result-tab")
        );
        resultTab.show();
      }

      // Wandelt z.B. "MAX MUSTERMANN" → "Max Mustermann"
      function toTitleCase(str) {
        return str
          .toLowerCase()
          .split(" ")
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }

      // Anfang aller Daten-Arrays und Quill-Variable
      let experienceData = [];
      let educationData = [];
      let internshipData = [];
      let lastGeneratedLetterHTML = "";
      let quill;

      window.addEventListener("DOMContentLoaded", () => {
        // Quill initialisieren
        quill = new Quill("#responseEditor", {
          theme: "snow",
          placeholder: "Du kannst dein Anschreiben hier bearbeiten.",
          modules: { toolbar: "#toolbar" },
        });
        document.getElementById("quillWrapper").style.display = "none";

        // State wiederherstellen
        loadState();

        // Auto-Save bei jeder Eingabe in Formularfeldern
        document
          .querySelectorAll(
            "#formPersonal input, #formJob input, #formJob textarea"
          )
          .forEach((el) => el.addEventListener("input", saveState));
      });

      async function startAgent() {
        const data = {
          name: document.getElementById("name").value,
          birthdate: document.getElementById("birthdate").value,
          address: document.getElementById("address").value,
          phone: document.getElementById("phone").value,
          email: document.getElementById("email").value,
          linkedin: document.getElementById("linkedin").value,
          jobTitle: document.getElementById("jobTitle").value,
          company: document.getElementById("company").value,
          companyUrl: document.getElementById("companyUrl").value,
          jobDescription: document.getElementById("jobDescription").value,
          experienceData: experienceData,
          educationData: educationData,
          internshipData: internshipData,
        };

        if (
          !data.companyUrl ||
          !data.name ||
          !data.birthdate ||
          !data.address ||
          !data.jobTitle ||
          !data.company ||
          !data.jobDescription
        ) {
          alert("Bitte fülle alle Pflichtfelder aus.");
          return;
        }

        const loadingStatus = document.getElementById("loadingStatus");
        const loadingText = document.getElementById("loadingText");

        loadingStatus.hidden = false;
        loadingText.textContent =
          "⏳ Der KI-Agent generiert dein Bewerbungsschreiben…";

        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 60000);

          const response = await fetch("/api/generate-cover-letter", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
            signal: controller.signal,
          });

          clearTimeout(timeoutId);
          const result = await response.json();

          if (response.ok) {
            const formatted = formatLetter(result.coverLetter);
            quill.clipboard.dangerouslyPasteHTML(formatted); // ✅ der richtige Weg
            lastGeneratedLetterHTML = formatted;
            document.getElementById("responseOutput").innerHTML = formatted;

            document.getElementById("responseOutput").style.display = "block";
            document.getElementById("editButton").hidden = false;
            document.getElementById("saveButton").hidden = true;

            loadingText.textContent =
              "✅ Bewerbungsschreiben erfolgreich erstellt!";

            saveState();
          } else {
            quill.root.innerHTML = "";
            loadingText.textContent =
              "❌ Fehler beim Generieren des Schreibens.";
          }
        } catch (error) {
          quill.root.innerHTML = "";
          loadingText.textContent = "❌ Fehler beim Senden der Anfrage.";
          console.error(error);
        } finally {
          setTimeout(() => {
            loadingStatus.hidden = true;
          }, 2000);
        }
      }

      // Upload Funktion
      async function uploadCV(event) {
        event.preventDefault(); // Verhindert Neuladen der Seite

        const fileInput = document.getElementById("cvUpload");
        const status = document.getElementById("uploadStatus");

        if (!fileInput.files[0]) {
          alert("Bitte eine PDF-Datei auswählen!");
          return;
        }

        const formData = new FormData();
        formData.append("cv", fileInput.files[0]);

        status.style.display = "inline";
        status.textContent = "📤 Datei wird hochgeladen...";

        try {
          const res = await fetch("/api/upload-cv", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          console.log("📦 Daten vom Server erhalten:", data);

          if (!data.extracted) {
            console.error("⚠️ Keine 'extracted'-Antwort vom Server erhalten!");
            status.textContent =
              "⚠️ KI konnte keine Daten extrahieren. Bitte versuchen Sie es nochmals. Sollte der Fehler weiterhin bestehen, füllen Sie bitte die Formulardaten manuell aus.";
            return;
          }

          status.textContent = "✅ KI-Daten erhalten. Verarbeite Antwort...";
          await delay(500); // kleine Pause, damit Status sichtbar bleibt

          const json = data.extracted;
          console.log("✅ Verarbeitetes JSON:", json);
          console.log("➡️ Versuche, Felder zu befüllen...");

          // Name
          if (json.name) {
            console.log("✏️ Name gefunden:", json.name);
            document.getElementById("name").value = toTitleCase(json.name);
          }

          // Geburtsdatum (Konvertierung DD.MM.YYYY ➔ YYYY-MM-DD)
          if (json.birthdate) {
            console.log("✏️ Geburtsdatum gefunden:", json.birthdate);
            const parts = json.birthdate.split(".");
            if (parts.length === 3) {
              const formattedDate = `${parts[2]}-${parts[1].padStart(
                2,
                "0"
              )}-${parts[0].padStart(2, "0")}`;
              document.getElementById("birthdate").value = formattedDate;
            } else {
              console.warn(
                "⚠️ Geburtsdatum konnte nicht umformatiert werden:",
                json.birthdate
              );
            }
          }

          // Adresse
          if (json.address) {
            console.log("✏️ Adresse gefunden:", json.address);
            document.getElementById("address").value = json.address;
          }

          // Telefon
          if (json.phone) {
            console.log("✏️ Telefon gefunden:", json.phone);
            document.getElementById("phone").value = json.phone;
          }

          // E-Mail
          if (json.email) {
            console.log("✏️ E-Mail gefunden:", json.email);
            document.getElementById("email").value = json.email;
          }

          // LinkedIn
          if (json.linkedin) {
            console.log("✏️ LinkedIn gefunden:", json.linkedin);
            document.getElementById("linkedin").value = json.linkedin;
          }

          // Berufserfahrungen
          if (json.experience && Array.isArray(json.experience)) {
            console.log(
              "✏️ Strukturierte Berufserfahrungen gefunden:",
              json.experience
            );
            const newExperiences = json.experience.map((exp) => {
              if (typeof exp === "string") {
                return { tätigkeit: exp, zeitraum: "", einrichtung: "" };
              }
              return {
                tätigkeit: exp.tätigkeit || "",
                zeitraum: exp.zeitraum || "",
                einrichtung: exp.einrichtung || "",
              };
            });
            experienceData = [...experienceData, ...newExperiences];
            renderExperienceList();
          }

          // Schulbildung/Ausbildung
          if (json.education && Array.isArray(json.education)) {
            console.log("✏️ Schulbildung/Ausbildung gefunden:", json.education);
            const newEducation = json.education.map((edu) => ({
              abschluss: edu.abschluss || "",
              schulname: edu.schulname || "",
              zeitraum: edu.zeitraum || "",
            }));
            educationData = [...educationData, ...newEducation];
            renderEducationList();
          }

          // Praktika
          if (json.internships && Array.isArray(json.internships)) {
            console.log("✏️ Praktika gefunden:", json.internships);
            const newInternships = json.internships.map((intern) => ({
              praktikum: intern.praktikum || "",
              zeitraum: intern.zeitraum || "",
              unternehmen: intern.unternehmen || "",
            }));
            internshipData = [...internshipData, ...newInternships];
            renderInternshipList();
          }

          status.textContent = "✅ Felder erfolgreich aus KI-Daten befüllt!";
          // **Autosave**: alle soeben befüllten Felder landen jetzt im localStorage
          saveState();
        } catch (err) {
          console.error("❌ Schwerer Fehler bei Upload/Verarbeitung:", err);
          status.textContent =
            "❌ Schwerer Fehler beim Upload oder bei der Analyse.";
        }
      }

      // Hilfsfunktion für kleine Wartezeiten
      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      // Rendern der Berufsausbildung
      function renderExperienceList() {
        const experienceList = document.getElementById("experienceList");
        experienceList.innerHTML = "";

        experienceData.forEach((exp, index) => {
          const item = document.createElement("div");
          item.className = "list-group-item mb-3 shadow-sm rounded";

          item.innerHTML = `
      <div class="row g-3 align-items-center">
        <div class="col-md-1 d-flex align-items-center justify-content-center">
          <span class="drag-handle" style="cursor: grab;">☰</span>
        </div>
        <div class="col-md-4">
          <label class="form-label">Praktikum</label>
          <input type="text" class="form-control" value="${
            exp.tätigkeit || ""
          }" 
            onchange="updateExperienceField(${index}, 'tätigkeit', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Unternehmen</label>
           <input type="text" class="form-control" value="${
             exp.einrichtung || ""
           }" 
            onchange="updateExperienceField(${index}, 'einrichtung', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Zeitraum</label>
          <input type="text" class="form-control" value="${exp.zeitraum || ""}" 
            onchange="updateExperienceField(${index}, 'zeitraum', this.value)">
        </div>
      </div>
      <div class="text-end mt-2">
        <button class="btn btn-sm btn-danger" onclick="deleteExperience(${index})">
          🗑️ Löschen
        </button>
      </div>
    `;
          experienceList.appendChild(item);
        });
      }

      // Rendern der Schulbildung/Ausbildung
      function renderEducationList() {
        const educationList = document.getElementById("educationList");
        educationList.innerHTML = "";

        educationData.forEach((edu, index) => {
          const item = document.createElement("div");
          item.className = "list-group-item mb-3 shadow-sm rounded";

          item.innerHTML = `
      <div class="row g-3 align-items-center">
        <div class="col-md-1 d-flex align-items-center justify-content-center">
          <span class="drag-handle" style="cursor: grab;">☰</span>
        </div>
        <div class="col-md-4">
          <label class="form-label">Abschluss</label>
          <input type="text" class="form-control" value="${
            edu.abschluss || ""
          }" 
            onchange="updateEducationField(${index}, 'abschluss', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Schulname</label>
          <input type="text" class="form-control" value="${
            edu.schulname || ""
          }" 
            onchange="updateEducationField(${index}, 'schulname', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Zeitraum</label>
          <input type="text" class="form-control" value="${edu.zeitraum || ""}" 
            onchange="updateEducationField(${index}, 'zeitraum', this.value)">
        </div>
      </div>
      <div class="text-end mt-2">
        <button class="btn btn-sm btn-danger" onclick="deleteEducation(${index})">
          🗑️ Löschen
        </button>
      </div>
    `;
          educationList.appendChild(item);
        });
      }

      // Rendern der Praktika
      function renderInternshipList() {
        const internshipList = document.getElementById("internshipList");
        internshipList.innerHTML = "";

        internshipData.forEach((intern, index) => {
          const item = document.createElement("div");
          item.className = "list-group-item mb-3 shadow-sm rounded";

          item.innerHTML = `
      <div class="row g-3 align-items-center">
        <div class="col-md-1 d-flex align-items-center justify-content-center">
          <span class="drag-handle" style="cursor: grab;">☰</span>
        </div>
        <div class="col-md-4">
          <label class="form-label">Praktikum</label>
          <input type="text" class="form-control" value="${
            intern.praktikum || ""
          }" 
            onchange="updateInternshipField(${index}, 'praktikum', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Unternehmen</label>
          <input type="text" class="form-control" value="${
            intern.unternehmen || ""
          }" 
            onchange="updateInternshipField(${index}, 'unternehmen', this.value)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Zeitraum</label>
          <input type="text" class="form-control" value="${
            intern.zeitraum || ""
          }" 
            onchange="updateInternshipField(${index}, 'zeitraum', this.value)">
        </div>
      </div>
      <div class="text-end mt-2">
        <button class="btn btn-sm btn-danger" onclick="deleteInternship(${index})">
          🗑️ Löschen
        </button>
      </div>
    `;
          internshipList.appendChild(item);
        });
      }

      // Update-Funktion für Berufsausbildungen
      function updateExperienceField(index, field, value) {
        experienceData[index][field] = value;
        console.log(
          `📝 Erfahrung ${index} - Feld ${field} aktualisiert auf:`,
          value
        );
      }

      // Update-Funktion für Education
      function updateEducationField(index, field, value) {
        educationData[index][field] = value;
        console.log(
          `📝 Schulbildung ${index} - Feld ${field} aktualisiert auf:`,
          value
        );
      }

      // Update-Funktion für Internship
      function updateInternshipField(index, field, value) {
        internshipData[index][field] = value;
        console.log(
          `📝 Praktikum ${index} - Feld ${field} aktualisiert auf:`,
          value
        );
      }

      // Löschen der Berufsausbildungen
      function deleteExperience(index) {
        if (confirm("Willst du diese Erfahrung wirklich löschen?")) {
          // Konsolenausgabe zum Prüfen des aktuellen Zustands
          console.log("Vor dem Löschen:", experienceData);

          // Das Element löschen
          experienceData.splice(index, 1);

          // Konsolenausgabe nach dem Löschen
          console.log("Nach dem Löschen:", experienceData);

          // Liste neu rendern
          renderExperienceList();
        }
      }

      // Löschen der Schulbildung/Ausbildung
      function deleteEducation(index) {
        if (
          confirm("Willst du diese Schulbildung/Ausbildung wirklich löschen?")
        ) {
          educationData.splice(index, 1);
          renderEducationList();
        }
      }

      // Löschen des Praktikums
      function deleteInternship(index) {
        if (confirm("Willst du dieses Praktikum wirklich löschen?")) {
          internshipData.splice(index, 1);
          renderInternshipList();
        }
      }

      function editExperience(index) {
        const exp = experienceData[index];
        const tätigkeit = prompt("Tätigkeit bearbeiten:", exp.tätigkeit || "");
        const zeitraum = prompt("Zeitraum bearbeiten:", exp.zeitraum || "");
        const einrichtung = prompt(
          "Einrichtung bearbeiten:",
          exp.einrichtung || ""
        );

        if (tätigkeit !== null && zeitraum !== null && einrichtung !== null) {
          experienceData[index] = { tätigkeit, zeitraum, einrichtung };
          renderExperienceList();
        }
      }

      // Manuelles Hinzufügen von Berufserfahrungen
      function addExperience() {
        experienceData.push({ tätigkeit: "", zeitraum: "", einrichtung: "" });
        renderExperienceList();
      }

      // Manuelles Hinzufügen von Schulbildung/Ausbildung
      function addEducation() {
        educationData.push({ abschluss: "", schulname: "", zeitraum: "" });
        renderEducationList();
      }

      // Manuelles Hinzufügen von Praktika
      function addInternship() {
        internshipData.push({ praktikum: "", zeitraum: "", unternehmen: "" });
        renderInternshipList();
      }

      // Nach dem DOM-Render einmal Sortable aktivieren
      new Sortable(document.getElementById("experienceList"), {
        animation: 150,
        handle: ".drag-handle",
        ghostClass: "bg-light",
        onEnd: function (evt) {
          // Neue Reihenfolge übernehmen
          const oldIndex = evt.oldIndex;
          const newIndex = evt.newIndex;

          if (oldIndex !== newIndex) {
            const movedItem = experienceData.splice(oldIndex, 1)[0];
            experienceData.splice(newIndex, 0, movedItem);
            console.log("🔀 Neue Reihenfolge:", experienceData);
          }
        },
      });

      new Sortable(document.getElementById("educationList"), {
        animation: 150,
        handle: ".drag-handle",
        ghostClass: "bg-light",
        onEnd: function (evt) {
          // Neue Reihenfolge übernehmen
          const oldIndex = evt.oldIndex;
          const newIndex = evt.newIndex;

          if (oldIndex !== newIndex) {
            const movedItem = educationData.splice(oldIndex, 1)[0];
            educationData.splice(newIndex, 0, movedItem);
            console.log("🔀 Neue Reihenfolge:", educationData);
          }
        },
      });

      new Sortable(document.getElementById("internshipList"), {
        animation: 150,
        handle: ".drag-handle",
        ghostClass: "bg-light",
        onEnd: function (evt) {
          // Neue Reihenfolge übernehmen
          const oldIndex = evt.oldIndex;
          const newIndex = evt.newIndex;

          if (oldIndex !== newIndex) {
            const movedItem = internshipData.splice(oldIndex, 1)[0];
            internshipData.splice(newIndex, 0, movedItem);
            console.log("🔀 Neue Reihenfolge:", internshipData);
          }
        },
      });

      function formatLetter(text) {
        // Markdown **fett** in echtes HTML <strong> umwandeln
        text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

        // Absätze erkennen (2 oder mehr Zeilenumbrüche)
        const paragraphs = text.trim().split(/\n\s*\n/);

        return paragraphs
          .map((p) => `<p>${p.replace(/\n/g, " ")}</p>`)
          .join("");
      }

      function copyLetter() {
        const html = quill.root.innerHTML;
        navigator.clipboard.writeText(quill.getText()).then(() => {
          alert("Anschreiben kopiert!");
        });
      }

      // Wechsel zu Quill-Bearbeitungsmodus
      function enterEditMode() {
        document.getElementById("responseOutput").style.display = "none";
        document.getElementById("quillWrapper").style.display = "block";

        quill.clipboard.dangerouslyPasteHTML(lastGeneratedLetterHTML || ""); // fallback auf leeren String

        document.getElementById("editButton").hidden = true;
        document.getElementById("saveButton").hidden = false;
      }

      function exitEditMode() {
        const plainTextDiv = document.getElementById("responseOutput");
        const wrapper = document.getElementById("quillWrapper");

        // 1) Aktuelles Quill-HTML in die Variable schreiben
        lastGeneratedLetterHTML = quill.root.innerHTML;
        // 2) Ausgabe damit updaten
        plainTextDiv.innerHTML = lastGeneratedLetterHTML;
        // 3) Und direkt in localStorage sichern
        saveState();

        // 4) Quill-Editor und Toolbar verbergen, Ausgabe wieder einblenden
        wrapper.style.display = "none";
        plainTextDiv.style.display = "block";

        // 5) Buttons umschalten
        document.getElementById("editButton").hidden = false;
        document.getElementById("saveButton").hidden = true;
      }
    </script>
  </body>
</html>
