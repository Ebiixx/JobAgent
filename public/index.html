<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobAgent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="mb-4 text-center">📄 JobAgent – Bewerbungshelfer</h1>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="formTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="personal-tab" data-bs-toggle="tab" data-bs-target="#personal" type="button" role="tab">1. Persönliche Daten</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="job-tab" data-bs-toggle="tab" data-bs-target="#job" type="button" role="tab">2. Job & Arbeitgeber</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="result-tab" data-bs-toggle="tab" data-bs-target="#result" type="button" role="tab">3. KI Agent starten</button>
      </li>
    </ul>

    <!-- Tab-Inhalte -->
    <div class="tab-content" id="formTabsContent">

      <!-- Persönliche Daten -->
      <div class="tab-pane fade show active" id="personal" role="tabpanel">
        <form id="formPersonal">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="name" placeholder="Max Mustermann" />
          </div>
          <div class="mb-3">
            <label class="form-label">Geburtsdatum</label>
            <input type="date" class="form-control" id="birthdate" />
          </div>
          <div class="mb-3">
            <label class="form-label">Adresse</label>
            <input type="text" class="form-control" id="address" />
          </div>
          <div class="mb-3">
            <label class="form-label">Berufserfahrung</label>
            <textarea class="form-control" id="experience" rows="3" placeholder="z. B. Projektmanager bei Firma X von 2019–2023..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Lebenslauf (PDF)</label>
            <input type="file" class="form-control" id="cvUpload" accept=".pdf" />
            <button type="button" class="btn btn-secondary mt-2" onclick="uploadCV(event)">📤 PDF auslesen</button>
            <div id="uploadStatus" class="form-text text-muted mt-1" style="display: none;">⏳ Wird analysiert...</div>
          </div>    
        </form>
      </div>

      <!-- Job & Arbeitgeber -->
      <div class="tab-pane fade" id="job" role="tabpanel">
        <form id="formJob">
          <div class="mb-3">
            <label class="form-label">Stellenbezeichnung</label>
            <input type="text" class="form-control" id="jobTitle" placeholder="z. B. Softwareentwickler (m/w/d)" />
          </div>
          <div class="mb-3">
            <label class="form-label">Unternehmen</label>
            <input type="text" class="form-control" id="company" placeholder="z. B. Acme GmbH" />
          </div>
          <div class="mb-3">
            <label class="form-label">Unternehmens-Website</label>
            <input type="url" class="form-control" id="companyUrl" placeholder="https://..." />
          </div>
          <div class="mb-3">
            <label class="form-label">Stellenbeschreibung</label>
            <textarea class="form-control" id="jobDescription" rows="3"></textarea>
          </div>
        </form>
      </div>

      <!-- Resultat -->
      <div class="tab-pane fade" id="result" role="tabpanel">
        <p>Wenn alle Angaben gemacht sind, kannst du den KI-Agenten starten:</p>
        <button class="btn btn-success" onclick="startAgent()">🚀 Bewerbung erstellen lassen</button>
        <span id="loading" class="ms-3 text-muted" style="display: none;">⏳ Agent arbeitet...</span>

        <div class="mt-4">
          <h5>Antwort:</h5>
          <pre id="responseOutput" class="bg-white p-3 rounded border text-wrap"></pre>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Script -->
  <script>
    async function startAgent() {
      const data = {
        name: document.getElementById('name').value,
        birthdate: document.getElementById('birthdate').value,
        address: document.getElementById('address').value,
        experience: document.getElementById('experience').value,
        jobTitle: document.getElementById('jobTitle').value,
        company: document.getElementById('company').value,
        companyUrl: document.getElementById('companyUrl').value,
        jobDescription: document.getElementById('jobDescription').value,
      };

      const prompt = `
Ich bin ${data.name}, geboren am ${data.birthdate}, wohnhaft in ${data.address}.
Ich habe folgende berufliche Erfahrungen: ${data.experience}.

Ich bewerbe mich als ${data.jobTitle} bei ${data.company}.
Die Stellenbeschreibung lautet: ${data.jobDescription}
Die Unternehmensseite ist: ${data.companyUrl}

Bitte formuliere ein professionelles Bewerbungsschreiben dafür.`;

      document.getElementById('loading').style.display = 'inline';
      document.getElementById('responseOutput').textContent = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: prompt }),
        });

        const result = await res.json();
        document.getElementById('responseOutput').textContent = result.reply || 'Keine Antwort erhalten.';
      } catch (err) {
        document.getElementById('responseOutput').textContent = '❌ Fehler beim Starten des Agenten.';
        console.error(err);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function uploadCV(event) {
  event.preventDefault(); // <<< WICHTIG!! Verhindert das Neuladen

  const fileInput = document.getElementById('cvUpload');
  const status = document.getElementById('uploadStatus');

  if (!fileInput.files[0]) {
    alert('Bitte eine PDF-Datei auswählen!');
    return;
  }

  const formData = new FormData();
  formData.append('cv', fileInput.files[0]);

  status.style.display = 'inline';
  status.textContent = '📤 Datei wird hochgeladen...';

  try {
    const res = await fetch('/api/upload-cv', {
      method: 'POST',
      body: formData,
    });

    const data = await res.json();
    console.log("📦 Daten vom Server erhalten:", data);

    if (!data.extracted) {
      console.error("⚠️ Keine 'extracted'-Antwort vom Server erhalten!");
      status.textContent = '⚠️ KI konnte keine Daten extrahieren.';
      return;
    }

    status.textContent = '✅ KI-Daten erhalten. Verarbeite Antwort...';
    await delay(500); // kleine Pause, damit Status sichtbar bleibt

    const json = data.extracted;

    console.log("✅ Verarbeitetes JSON:", json);

    if (json) {
      console.log("➡️ Versuche, Felder zu befüllen...");

      if (json.name) {
        console.log("✏️ Name gefunden:", json.name);
        document.getElementById('name').value = json.name;
      }
      if (json.birthdate) {
        console.log("✏️ Geburtsdatum gefunden:", json.birthdate);
        document.getElementById('birthdate').value = json.birthdate;
      }
      if (json.address) {
        console.log("✏️ Adresse gefunden:", json.address);
        document.getElementById('address').value = json.address;
      }
      if (json.experience && Array.isArray(json.experience)) {
        console.log("✏️ Berufserfahrung gefunden:", json.experience);
        document.getElementById('experience').value = json.experience.join("\n");
      }

      status.textContent = '✅ Felder erfolgreich aus KI-Daten befüllt!';
    } else {
      console.error("⚠️ JSON war leer oder ungültig.");
      status.textContent = '⚠️ KI-Antwort konnte nicht verarbeitet werden.';
    }

  } catch (err) {
    console.error("❌ Schwerer Fehler bei Upload/Verarbeitung:", err);
    status.textContent = '❌ Schwerer Fehler beim Upload oder bei der Analyse.';
  }
}


// Hilfsfunktion für kleine Wartezeiten
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}





// Hilfsfunktion für Delay
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}


  </script>
</body>
</html>
